name: Pier Cam — 12:00 PM Capture

on:
  schedule:
    # 12:00 PM PDT = 19:00 UTC  |  12:00 PM PST = 20:00 UTC
    - cron: '5 19 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Capture pier cam screenshot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAPTURE_TIME: '12:00'
        run: node scripts/capture-pier-cam.js

      - name: Commit and push snapshot
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/snapshots/ data/snapshots.json
          git diff --staged --quiet || git commit -m "📷 Pier cam 12PM $(date -u +%Y-%m-%d)"
          git push
