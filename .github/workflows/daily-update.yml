name: Daily Data Update

on:
  schedule:
    # 8:30 AM PDT = 15:30 UTC — runs after overnight satellite composites are published
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ocean-data pipeline (satellite + surf + weather + scrape)
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          NASA_EARTHDATA_USER:   ${{ secrets.NASA_EARTHDATA_USER }}
          NASA_EARTHDATA_PASS:   ${{ secrets.NASA_EARTHDATA_PASS }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:            ${{ secrets.FROM_EMAIL }}
          BASE_URL:              ${{ secrets.BASE_URL }}
        run: npx tsx scripts/update-all.ts
        # update-all.ts exits non-zero if any critical fetcher (satellite/surf/weather) fails.
        # Scrape (JustGetWet) is non-critical and retried internally.
