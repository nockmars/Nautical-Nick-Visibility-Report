name: Pier Cam — 7:00 AM Capture

on:
  schedule:
    # 7:00 AM PDT = 14:00 UTC  |  7:00 AM PST = 15:00 UTC
    # Using 14:05 UTC so it fires after the hour in both seasons
    - cron: '5 14 * * *'
  workflow_dispatch:
    inputs:
      capture_time:
        description: 'Override capture time label (default: 07:00)'
        required: false
        default: '07:00'

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Capture pier cam screenshot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAPTURE_TIME: '07:00'
        run: node scripts/capture-pier-cam.js

      - name: Commit and push snapshot
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/snapshots/ data/snapshots.json
          git diff --staged --quiet || git commit -m "📷 Pier cam 7AM $(date -u +%Y-%m-%d)"
          git push
